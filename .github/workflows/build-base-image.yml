# Build Base Docker Image for Neuron CI
# Builds torch-neuronx from source (~45-60 min) and pushes to ECR.
# The resulting image is used as the base for fast PR test runs in pull.yml.
#
# Trigger: Manual (workflow_dispatch) from GitHub Actions UI
#   Actions tab → "Build Base Image" → "Run workflow"
name: Build Base Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'ECR image tag (e.g. latest.good, base-20260228)'
        required: false
        default: 'latest.good'

permissions:
  contents: read

env:
  AWS_DEFAULT_REGION: us-west-2

jobs:
  build-base-image:
    name: Build torch-neuronx Base Image
    runs-on: [self-hosted, linux, neuron]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Image Build via NeuronImageBuilder API
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest.good' }}
        run: |
          echo "============================================="
          echo "  Building Base Image: ${IMAGE_TAG}"
          echo "============================================="

          # Read Dockerfile content and base64-encode it
          DOCKERFILE_B64=$(base64 -w0 docker/Dockerfile.torch-neuronx-base)
          echo "Dockerfile size: $(wc -c < docker/Dockerfile.torch-neuronx-base) bytes"

          # Get API URL and ECR repo from runner environment
          API_URL="${IMAGE_BUILDER_API_URL:-}"
          ECR_REPO="${IMAGE_BUILDER_ECR_REPO:-}"

          if [ -z "$API_URL" ]; then
            echo "ERROR: IMAGE_BUILDER_API_URL not set in runner environment"
            echo "This workflow must run on a runner in the alpha account (882938390504)"
            exit 1
          fi

          echo "API URL: ${API_URL}"
          echo "ECR Repo: ${ECR_REPO}"
          echo "Image Tag: ${IMAGE_TAG}"

          # Call NeuronImageBuilder API with SigV4 auth
          python3 << PYEOF
          import boto3
          import json
          import time
          import sys
          import os
          from botocore.auth import SigV4Auth
          from botocore.awsrequest import AWSRequest
          from urllib.request import urlopen, Request
          from urllib.error import HTTPError

          api_url = os.environ['API_URL']
          image_tag = os.environ['IMAGE_TAG']
          dockerfile_b64 = os.environ['DOCKERFILE_B64']

          session = boto3.Session(region_name='us-west-2')
          credentials = session.get_credentials().get_frozen_credentials()

          # Step 1: Upload Dockerfile to S3 via a known bucket
          # The runner has access to the CI assets bucket
          s3 = session.client('s3')
          sts = session.client('sts')
          account_id = sts.get_caller_identity()['Account']
          bucket = f'neuron-ci-assets-{account_id}-alpha'

          import base64
          dockerfile_content = base64.b64decode(dockerfile_b64).decode('utf-8')

          s3_key = f'base-image-builds/Dockerfile.torch-neuronx-base'
          print(f'Uploading Dockerfile to s3://{bucket}/{s3_key}')

          try:
              s3.put_object(Bucket=bucket, Key=s3_key, Body=dockerfile_content)
              print(f'Uploaded successfully')
              dockerfile_s3_url = f's3://{bucket}/{s3_key}'
          except Exception as e:
              print(f'S3 upload failed: {e}')
              print('Falling back to inline dockerfile via build_args')
              dockerfile_s3_url = None

          # Step 2: Call NeuronImageBuilder API
          payload = {
              'os': 'ubuntu22.04',
              'framework': 'pytorch',
              'job_type': 'training',
              'image_tag': image_tag,
              'build_args': []
          }

          if dockerfile_s3_url:
              payload['dockerfile'] = dockerfile_s3_url

          body = json.dumps(payload)
          print(f'Calling API: {api_url}')
          print(f'Payload: {json.dumps(payload, indent=2)}')

          request = AWSRequest(method='POST', url=api_url, data=body,
                               headers={'Content-Type': 'application/json'})
          SigV4Auth(credentials, 'execute-api', 'us-west-2').add_auth(request)

          try:
              req = Request(api_url, data=body.encode(),
                           headers=dict(request.headers), method='POST')
              resp = urlopen(req, timeout=30)
              result = json.loads(resp.read().decode())
              print(f'API Response: {json.dumps(result, indent=2)}')
          except HTTPError as e:
              error_body = e.read().decode() if e.fp else 'no body'
              print(f'API Error {e.code}: {error_body}')
              sys.exit(1)

          request_id = result.get('requestId')
          if not request_id:
              print('ERROR: No requestId in API response')
              sys.exit(1)

          print(f'Build started! Request ID: {request_id}')
          print(f'Image URI: {result.get("imageURI", "unknown")}')

          # Step 3: Poll for completion
          poll_url = api_url.replace('/builds', f'/builds/{request_id}')
          max_polls = 120  # 120 * 60s = 2 hours
          for i in range(max_polls):
              time.sleep(60)
              elapsed = (i + 1)

              request = AWSRequest(method='GET', url=poll_url,
                                   headers={'Content-Type': 'application/json'})
              SigV4Auth(credentials, 'execute-api', 'us-west-2').add_auth(request)

              try:
                  req = Request(poll_url, headers=dict(request.headers), method='GET')
                  resp = urlopen(req, timeout=30)
                  status_result = json.loads(resp.read().decode())
              except HTTPError as e:
                  print(f'  Poll error (attempt {elapsed}): {e.code}')
                  continue

              status = status_result.get('status', 'UNKNOWN')
              print(f'  [{elapsed}/120] Status: {status} ({elapsed}m elapsed)')

              if status == 'SUCCEEDED':
                  image_uri = status_result.get('imageURI', result.get('imageURI', 'unknown'))
                  print(f'')
                  print(f'============================================')
                  print(f'  BASE IMAGE BUILD SUCCEEDED!')
                  print(f'  Image: {image_uri}')
                  print(f'  Tag: {image_tag}')
                  print(f'  Duration: ~{elapsed} minutes')
                  print(f'============================================')
                  print(f'')
                  print(f'Update pull.yml IMAGE_URI to:')
                  print(f'  {image_uri}')
                  sys.exit(0)
              elif status in ('FAILED', 'FAULT', 'TIMED_OUT', 'STOPPED'):
                  print(f'BUILD FAILED with status: {status}')
                  print(f'Details: {json.dumps(status_result, indent=2)}')
                  sys.exit(1)

          print('ERROR: Build timed out after 2 hours')
          sys.exit(1)
          PYEOF
