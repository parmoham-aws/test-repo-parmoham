name: Test Nightly Stable Tagging

# Temporary test workflow - just tests stable tagging with hardcoded image
# Will be reverted after successful test
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote-to-stable:
    name: Tag as Stable
    runs-on: [
      self-hosted,
      linux,
      neuron.tag-nightly-stable,
      neuron.nightly-image:882938390504.dkr.ecr.us-west-2.amazonaws.com/neuron-image-builder-alpha:private-neuron-integration-dev-nightly-nightly-base-20260305-000044
    ]
    steps:
      - name: Verify stable tag
        run: |
          echo "========================================="
          echo "  Stable Tagging Verification"
          echo "========================================="
          
          # Set image URI for verification script
          export NIGHTLY_IMAGE_URI="882938390504.dkr.ecr.us-west-2.amazonaws.com/neuron-image-builder-alpha:private-neuron-integration-dev-nightly-nightly-base-20260305-000044"
          
          echo "Image: $NIGHTLY_IMAGE_URI"
          
          # Call verification script (installed by updated user data)
          /opt/neuron-ci/verify-stable-tag.sh
          
          echo "✓ Stable tagging verification complete"