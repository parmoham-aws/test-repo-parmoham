name: Kaizen Neuron Tests

# Runs Neuron tests via Kaizen EKS proxy on trn1.32xlarge instances.
# This workflow runs IN PARALLEL with pull.yml — it does NOT replace it.
#
# How it works:
#   1. Jobs use runs-on: [self-hosted, linux, neuron] which triggers
#      NeuronGithubCI to launch a trn1.32xlarge EC2 runner with Kaizen proxy.
#   2. The Kaizen proxy (transparent bash wrapper) intercepts each `run:` step
#      and dispatches it to a Kaizen EKS cluster with Neuron hardware.
#   3. Kaizen handles: ECR auth, image pull, container creation, Neuron device mounting.
#   4. Therefore NO Docker steps (ECR Login, Docker Pull, Docker Run) are needed.
#
# Key difference from pull.yml:
#   - pull.yml uses Docker-on-EC2 (ECR login → docker pull → docker run)
#   - This file uses Kaizen (direct commands dispatched to EKS containers)
#
# IMPORTANT: Each `run:` step becomes a separate Kaizen workload.
#   Split steps for better isolation, debuggability, and timeout handling.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'
        type: boolean
      test_path:
        description: 'Specific test path to run (leave empty for all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: kaizen-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Torch Unit Tests via Kaizen (trn1.32xlarge)
  # ============================================
  kaizen-torch-unit-tests:
    name: Kaizen Torch Unit Tests
    runs-on:
      - self-hosted
      - linux
      - neuron
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Neuron Info
        run: |
          echo "============================================="
          echo "       KAIZEN TORCH UNIT TESTS               "
          echo "  (via Kaizen on trn1.32xlarge EKS cluster)  "
          echo "============================================="
          python3 --version
          python3 -c "import torch; print(f'PyTorch: {torch.__version__}')" || echo "PyTorch not available"
          neuron-ls || /opt/aws/neuron/bin/neuron-ls || echo "neuron-ls not available"
          echo "============================================="

      - name: Install Test Dependencies
        run: |
          pip install --index-url https://pypi.org/simple pytest pytest-xdist pytest-html pytest-json-report pytest-forked pytest-cov expecttest

      - name: Run Torch Unit Tests
        env:
          NEURON_LAUNCH_BLOCKING: "1"
        run: |
          echo "============================================="
          echo "         RUNNING TORCH UNIT TESTS            "
          echo "============================================="
          mkdir -p outputs/test-reports
          ./tools/run-test-parallel tests/ --skip-distributed --coverage --json-report --report-dir=outputs/test-reports || echo "Tests completed"
          echo "============================================="

  # ============================================
  # ATen Unit Tests via Kaizen (trn1.32xlarge)
  # ============================================
  kaizen-aten-unit-tests:
    name: Kaizen ATen Unit Tests
    runs-on:
      - self-hosted
      - linux
      - neuron
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Neuron Info
        run: |
          echo "============================================="
          echo "       NEURON ENVIRONMENT INFO               "
          echo "============================================="
          python3 --version
          python3 -c "import torch; print(f'PyTorch: {torch.__version__}')" || echo "PyTorch not available"
          neuron-ls || /opt/aws/neuron/bin/neuron-ls || echo "neuron-ls not available"
          echo "============================================="

      - name: Install Test Dependencies
        run: |
          pip install --index-url https://pypi.org/simple pytest pytest-xdist pytest-html pytest-json-report pytest-forked pytest-cov expecttest

      - name: Run ATen Unit Tests
        env:
          NEURON_LAUNCH_BLOCKING: "1"
        run: |
          echo "============================================="
          echo "           RUNNING ATEN UNIT TESTS           "
          echo "============================================="
          mkdir -p outputs/test-reports
          ./tools/run-test-parallel --skip-distributed --coverage --json-report --report-dir=outputs/test-reports
          echo "============================================="

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaizen-aten-test-results
          path: |
            outputs/
            *.html
            *.xml
          retention-days: 30
