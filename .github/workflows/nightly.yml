name: Nightly Base Image Build

# ⚠️ TESTING MODE: build-base is commented out, using hardcoded base image.
# TODO: Restore build-base job after testing build-nightly-whl flow.
#
# Workflow DAG (3-job sequential — normal mode):
#   build-base (neuron.build-nightly)
#       ↓
#   build-nightly-whl (neuron.build-nightly-whl)
#       ↓
#   promote-to-stable (neuron.tag-nightly-stable)
#
# TESTING MODE (current): build-nightly-whl → promote-to-stable
# Using pre-built base image directly.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: Build Base Image (COMMENTED OUT FOR TESTING) ────
  # build-base:
  #   name: Build Nightly Base Image
  #   runs-on: [self-hosted, linux, neuron.build-nightly]
  #   timeout-minutes: 120
  #   outputs:
  #     base_image: ${{ steps.wait.outputs.image_uri }}
  #   steps:
  #     - name: Wait for nightly base image
  #       id: wait
  #       run: |
  #         echo "========================================="
  #         echo "  Nightly Base Image Build"
  #         echo "  Branch: ${{ github.ref_name }}"
  #         echo "  Run ID: ${{ github.run_id }}"
  #         echo "========================================="
  #         /opt/neuron-ci/wait-for-nightly-image.sh | tee /tmp/nightly-output.log
  #         IMAGE_URI=$(grep "Nightly base image ready:" /tmp/nightly-output.log | sed 's/.*ready: //')
  #         echo "Captured image URI: $IMAGE_URI"
  #         echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Job 2: Build Complete Image + Wheel ─────────────────────
  # TESTING: Using hardcoded base image instead of build-base output.
  # The neuron.build-nightly-whl label triggers the Nightly Image Trigger Lambda
  # with build_wheel=true, which tells CodeBuild to also build + upload the wheel.
  build-nightly-whl:
    name: Build Complete Image + Wheel
    # needs: [build-base]  # COMMENTED OUT FOR TESTING
    runs-on: [
      self-hosted,
      linux,
      neuron.build-nightly-whl,
      "neuron.dockerfile:Dockerfile.complete",
      "neuron.base-image:882938390504.dkr.ecr.us-west-2.amazonaws.com/neuron-image-builder-alpha:private-neuron-integration-dev-nightly-whl-nightly-base-20260313-172818"
    ]
    timeout-minutes: 120
    outputs:
      complete_image: ${{ steps.wait.outputs.image_uri }}
    steps:
      - name: Wait for complete image + wheel build
        id: wait
        run: |
          echo "========================================="
          echo "  Build Complete Image + Wheel (TESTING)"
          echo "  Base: 882938390504.dkr.ecr.us-west-2.amazonaws.com/neuron-image-builder-alpha:private-neuron-integration-dev-nightly-whl-nightly-base-20260313-172818"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Run ID: ${{ github.run_id }}"
          echo "========================================="

          # Call the polling script installed by EC2 user data
          # This blocks until the complete image build finishes
          # CodeBuild also builds the wheel and uploads to dev-wheels release
          /opt/neuron-ci/wait-for-nightly-image.sh | tee /tmp/complete-output.log

          # Extract IMAGE_URI from the success message
          IMAGE_URI=$(grep "Nightly base image ready:" /tmp/complete-output.log | sed 's/.*ready: //')
          echo "Captured complete image URI: $IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Job 3: Promote to Stable ───────────────────────────────
  promote-to-stable:
    name: Promote to Stable
    needs: [build-nightly-whl]  # Removed build-base for testing
    if: success()
    runs-on: [
      self-hosted,
      linux,
      neuron.tag-nightly-stable,
      "neuron.nightly-image:${{ needs.build-nightly-whl.outputs.complete_image }}"
    ]
    permissions:
      contents: write
    steps:
      - name: Verify stable ECR tags
        run: |
          echo "========================================="
          echo "  Stable Tagging Verification"
          echo "========================================="

          IMAGE_URI="${{ needs.build-nightly-whl.outputs.complete_image }}"
          export NIGHTLY_IMAGE_URI="$IMAGE_URI"

          echo "Complete image: $NIGHTLY_IMAGE_URI"

          /opt/neuron-ci/verify-stable-tag.sh

          echo "✓ ECR stable tagging complete"

      - name: Promote wheel to stable-wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "========================================="
          echo "  Wheel Stable Promotion"
          echo "========================================="

          echo "Downloading wheel from dev-wheels release..."
          mkdir -p /tmp/stable-dist
          gh release download dev-wheels \
            --pattern "*.whl" \
            --dir /tmp/stable-dist \
            --repo "${{ github.repository }}" || {
            echo "WARNING: No wheel found in dev-wheels release. Skipping wheel promotion."
            exit 0
          }

          WHL_FILE=$(ls /tmp/stable-dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHL_FILE" ]; then
            echo "WARNING: No wheel file downloaded. Skipping wheel promotion."
            exit 0
          fi

          WHL_FILENAME=$(basename "$WHL_FILE")
          WHL_SHA256=$(sha256sum "$WHL_FILE" | cut -d' ' -f1)
          echo "Wheel: $WHL_FILENAME"
          echo "SHA256: $WHL_SHA256"
          echo "✓ SHA256 computed"

          echo "Uploading wheel to stable-wheels release..."

      - name: Release wheel to stable-wheels
        if: success()
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/stable-dist/*.whl
          tag: "stable-wheels"
          name: "Stable Wheels (Latest Validated)"
          body: |
            Latest validated private-torch-neuronx wheel.

            Branch: `${{ github.ref_name }}`
            Run: ${{ github.run_id }}

            Promoted from dev-wheels after successful nightly validation.
            Built from commit: ${{ github.sha }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "========================================="
          echo "  ✓ Nightly Build Complete (TESTING)"
          echo "========================================="
          echo "  Base image:     882938390504.dkr.ecr.us-west-2.amazonaws.com/neuron-image-builder-alpha:private-neuron-integration-dev-nightly-whl-nightly-base-20260313-172818 (hardcoded)"
          echo "  Complete image: ${{ needs.build-nightly-whl.outputs.complete_image }}"
          echo ""
          echo "  ECR stable tag: applied"
          echo "  GitHub Release: stable-wheels"
          echo "========================================="
