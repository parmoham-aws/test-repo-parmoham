name: Nightly Base Image Build

# Workflow DAG:
#   build-base (Dockerfile.base-dependencies)
#     ├── build-main-image (Dockerfile.main) → upstream-aten-tests
#     ├── build-nightly-whl (Dockerfile.complete + wheel) ─────────────────────┐
#     └────────────────────────────────────────────────────────────────────────→ promote-to-stable
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: Build Base Image ────────────────────────────────
  build-base:
    name: Build Nightly Base Image
    runs-on: [self-hosted, linux, neuron.build-image, "neuron.run-${{ github.run_id }}-build-base"]
    timeout-minutes: 120
    outputs:
      base_image: ${{ steps.wait.outputs.image_uri }}
    steps:
      - name: Wait for nightly base image
        id: wait
        run: |
          echo "========================================="
          echo "  Nightly Base Image Build"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Run ID: ${{ github.run_id }}"
          echo "========================================="
          IMAGE_URI=$(/opt/neuron-ci/wait-for-image.sh)
          echo "Captured image URI: $IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Job 2: Build Complete Image + Wheel ─────────────────────
  build-nightly-whl:
    name: Build Complete Image + Wheel (private-torch-neuronx)
    needs: [build-base]
    runs-on: [
      self-hosted,
      linux,
      neuron.build-image,
      neuron.build-wheel,
      neuron.create-test-whl,
      "neuron.dockerfile:Dockerfile.complete",
      "neuron.run-${{ github.run_id }}-build-nightly-whl",
      "neuron.base-image:${{ needs.build-base.outputs.base_image }}"
    ]
    timeout-minutes: 120
    outputs:
      complete_image: ${{ steps.wait.outputs.image_uri }}
      request_id: ${{ steps.wait.outputs.request_id }}
      wheel_filename: ${{ steps.wait.outputs.wheel_filename }}
    steps:
      - name: Wait for complete image + wheel build
        id: wait
        run: |
          echo "========================================="
          echo "  Build Complete Image + Wheel (private-torch-neuronx)"
          echo "  Base: ${{ needs.build-base.outputs.base_image }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Run ID: ${{ github.run_id }}"
          echo "========================================="

          # Call the unified wait-for-image.sh polling script
          # This blocks until the complete image build finishes
          # CodeBuild also builds the wheel and uploads to dev-wheels release
          # stdout = image URI only; stderr = verbose logs (captured for metadata extraction)
          IMAGE_URI=$(/opt/neuron-ci/wait-for-image.sh 2>/tmp/complete-output.log)
          echo "Captured complete image URI: $IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

          # Extract request_id from stderr log (for wheel promotion)
          REQUEST_ID=$(grep "Found request ID:" /tmp/complete-output.log | sed 's/.*ID: //')
          if [ -n "$REQUEST_ID" ]; then
            echo "Captured request ID: $REQUEST_ID"
            echo "request_id=$REQUEST_ID" >> $GITHUB_OUTPUT
          else
            echo "WARNING: No request ID found in build output"
          fi

          # Extract wheel filename from stderr log (if available)
          WHEEL_FILENAME=$(grep "Wheel:" /tmp/complete-output.log | sed 's/.*Wheel: //')
          if [ -n "$WHEEL_FILENAME" ]; then
            echo "Captured wheel filename: $WHEEL_FILENAME"
            echo "wheel_filename=$WHEEL_FILENAME" >> $GITHUB_OUTPUT
          else
            echo "WARNING: No wheel filename found in build output"
          fi

  # ── Job 3: Promote to Stable ───────────────────────────────
  promote-to-stable:
    name: Promote to Stable
    needs: [build-base, build-nightly-whl]
    if: success()
    runs-on: [
      self-hosted,
      linux,
      neuron.tag-stable,
      "neuron.image:${{ needs.build-base.outputs.base_image }}",
      "neuron.run-${{ github.run_id }}-promote-to-stable",
      "neuron.nightly-whl-stable-release:${{ needs.build-nightly-whl.outputs.request_id }}"
    ]
    permissions:
      contents: write
    steps:
      - name: Verify stable ECR tags
        run: |
          echo "========================================="
          echo "  Stable Tagging Verification"
          echo "========================================="

          IMAGE_URI="${{ needs.build-base.outputs.base_image }}"
          export NIGHTLY_IMAGE_URI="$IMAGE_URI"

          echo "Base image (for stable tag): $NIGHTLY_IMAGE_URI"

          /opt/neuron-ci/verify-stable-tag.sh

          echo "✓ ECR stable tagging complete"

      - name: Wheel promotion status
        run: |
          echo "========================================="
          echo "  Wheel Stable Promotion (Lambda-based)"
          echo "========================================="
          echo "  Wheel promotion is handled by the Nightly Wheel Promoter Lambda."
          echo "  The webhook detected neuron.nightly-whl-stable-release: label"
          echo "  and invoked the Lambda asynchronously to:"
          echo "    1. Download wheel from S3 (using request_id: ${{ needs.build-nightly-whl.outputs.request_id }})"
          echo "    2. Upload to GitHub Release 'stable-wheels'"
          echo ""
          echo "  Wheel filename: ${{ needs.build-nightly-whl.outputs.wheel_filename }}"
          echo "  Request ID: ${{ needs.build-nightly-whl.outputs.request_id }}"
          echo "  Check Lambda logs: /aws/lambda/neuron-nightly-whl-promoter-*"
          echo "========================================="

      - name: Summary
        run: |
          echo "========================================="
          echo "  ✓ Nightly Build Complete"
          echo "========================================="
          echo "  Base image:     ${{ needs.build-base.outputs.base_image }}"
          echo "  Complete image: ${{ needs.build-nightly-whl.outputs.complete_image }}"
          echo "  Wheel:          ${{ needs.build-nightly-whl.outputs.wheel_filename }}"
          echo ""
          echo "  ECR stable tag: applied"
          echo "  GitHub Release: stable-wheels (via Lambda)"
          echo "========================================="

  # ── Job 4: Build Main Test Image (Dockerfile.main) ─────────
  # Builds on top of base image, adds test dependencies and repo code.
  # Uses neuron.build-image (unified Lambda) with dockerfile override.
  build-main-image:
    name: Build Main Test Image
    needs: [build-base]
    if: always() && needs.build-base.result == 'success'
    runs-on: [
      self-hosted,
      linux,
      neuron.build-image,
      "neuron.run-${{ github.run_id }}-build-main-image",
      "neuron.dockerfile:Dockerfile.main",
      "neuron.base-image:${{ needs.build-base.outputs.base_image }}"
    ]
    timeout-minutes: 120
    outputs:
      main_image: ${{ steps.wait.outputs.image_uri }}
    steps:
      - name: Wait for main test image build
        id: wait
        run: |
          echo "========================================="
          echo "  Build Main Test Image"
          echo "  Base: ${{ needs.build-base.outputs.base_image }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Run ID: ${{ github.run_id }}"
          echo "========================================="
          IMAGE_URI=$(/opt/neuron-ci/wait-for-image.sh)
          echo "Main test image ready: $IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Job 5: Upstream ATen Tests ─────────────────────────────
  # Uses the dynamically-built main image via neuron.image: label.
  # No build labels — the image is already built by build-main-image.
  upstream-aten-tests:
    name: Upstream ATen Node ${{ matrix.node }}
    needs: [build-main-image]
    if: always() && needs.build-main-image.result == 'success'
    runs-on: [
      self-hosted,
      linux,
      neuron,
      neuron.internal_compute,
      neuron.internal_compute:trn2.48xlarge,
      "neuron.run-${{ github.run_id }}-upstream-aten-tests",
      "neuron.image:${{ needs.build-main-image.outputs.main_image }}"
    ]
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 0
            classes: "TestLikeTensorCreation"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run upstream ATen tests
        run: |
          export TEST_RUN_TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ./tests/pytorch_tests/run_upstream_aten_tests.sh \
            --output-dir /tmp/upstream_aten_artifacts \
            --total-timeout 21600 \
            ${{ matrix.classes }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-aten-node-${{ matrix.node }}
          path: /tmp/upstream_aten_artifacts/
          retention-days: 30
