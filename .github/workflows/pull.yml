name: PR Checks
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
env:
  AWS_DEFAULT_REGION: us-west-2
jobs:
  hello-world:
    name: Hello World Smoke Test
    runs-on: [self-hosted, linux, neuron, neuron.kaizen, neuron.build-image]
    steps:
      - name: Smoke Test
        run: |
          echo "Hello from Kaizen EKS container!"
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "PWD: $(pwd)"
          echo "Python: $(python3 --version 2>&1 || echo 'not found')"
          echo "Workspace contents:"
          ls -la /workspace/ || echo "No /workspace"
          A=1
          B=2
          C=$((A + B))
          echo "Math works: $A + $B = $C"
          if [ "$C" -eq 3 ]; then
            echo "SUCCESS: if/then/fi works!"
          else
            echo "FAIL"
            exit 1
          fi
  aten-unit-tests:
    name: ATen Unit Tests (trn1)
    runs-on: [self-hosted, linux, neuron, neuron.kaizen, neuron.build-image]
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ATen Unit Tests
        env:
          NEURON_LAUNCH_BLOCKING: "1"
        run: |
          echo "============================================="
          echo "       NEURON ENVIRONMENT INFO               "
          echo "============================================="
          python3 --version
          python3 -c "import torch; print(f'PyTorch: {torch.__version__}')" || echo "PyTorch not available"
          neuron-ls || /opt/aws/neuron/bin/neuron-ls || echo "neuron-ls not available"
          echo "============================================="
          pip install pytest pytest-xdist pytest-html pytest-json-report pytest-forked pytest-cov
          echo "============================================="
          echo "           RUNNING ATEN UNIT TESTS           "
          echo "============================================="
          mkdir -p outputs/test-reports
          ./tools/run-test-parallel --skip-distributed --coverage --json-report --report-dir=outputs/test-reports
          echo "============================================="
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aten-test-results
          path: |
            outputs/
            *.html
            *.xml
          retention-days: 30
