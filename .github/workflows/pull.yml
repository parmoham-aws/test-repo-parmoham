name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'
        type: boolean
      test_path:
        description: 'Specific test path to run (leave empty for all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  # Neuron Docker image from ECR with PyTorch and torch-neuronx pre-installed (Python 3.10+)
  DOCKER_IMAGE: 624280435858.dkr.ecr.us-west-2.amazonaws.com/golden_runner_images:neuron-training-torch-neuronx
  AWS_DEFAULT_REGION: us-west-2

jobs:
  # ============================================
  # PR Validation Jobs (GitHub-hosted)
  # ============================================
  pr-size-check:
    name: PR Size Check
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          STATS=$(git diff --shortstat $BASE_SHA $HEAD_SHA)
          echo "PR Stats: $STATS"
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((INSERTIONS + DELETIONS))
          echo "Lines changed: $TOTAL (insertions: $INSERTIONS, deletions: $DELETIONS)"
          if [ "$TOTAL" -gt 1000 ]; then
            echo "::warning::Large PR detected ($TOTAL lines changed). Consider breaking into smaller PRs."
          fi

  changed-files:
    name: Detect Changed Files
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request'
    outputs:
      python: ${{ steps.changes.outputs.python }}
      cpp: ${{ steps.changes.outputs.cpp }}
      tests: ${{ steps.changes.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
            cpp:
              - '**/*.cpp'
              - '**/*.h'
              - '**/*.hpp'
              - '**/*.cc'
            tests:
              - 'tests/**'

  # ============================================
  # Torch Unit Tests (c5 - CPU only, in container)
  # ============================================
  torch-unit-tests:
    name: Torch Unit Tests (c5)
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ECR Login
        run: |
          echo "Logging into ECR..."
          aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 624280435858.dkr.ecr.us-west-2.amazonaws.com
          echo "ECR login successful"

      - name: Pull Docker Image
        run: |
          echo "Pulling Docker image: $DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"

      - name: Run Torch Unit Tests in Container
        run: |
          echo "============================================="
          echo "         RUNNING TORCH UNIT TESTS            "
          echo "============================================="
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_WORKSPACE=/workspace \
            "$DOCKER_IMAGE" \
            bash -c "
              echo 'Python version:' && python3 --version
              echo 'PyTorch version:' && python3 -c 'import torch; print(torch.__version__)'
              echo ''
              echo 'Installing test dependencies...'
              pip install pytest pytest-xdist pytest-html pytest-json-report pytest-cov
              echo ''
              echo 'Running tests...'
              pytest tests/ -v --ignore=tests/neuron --ignore=tests/aten -x --tb=short || echo 'Tests completed'
            "
          echo "============================================="

      - name: Test Summary
        if: always()
        run: |
          echo "Torch unit tests completed in container"

  # ============================================
  # ATen Unit Tests (trn1.32xlarge - Neuron, in container)
  # ============================================
  aten-unit-tests:
    name: ATen Unit Tests (trn1)
    runs-on:
      - self-hosted
      - linux
      - neuron
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ECR Login
        run: |
          echo "Logging into ECR..."
          aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 624280435858.dkr.ecr.us-west-2.amazonaws.com
          echo "ECR login successful"

      - name: Pull Docker Image
        run: |
          echo "Pulling Docker image: $DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"

      - name: Print Neuron Info
        run: |
          echo "============================================="
          echo "       NEURON HOST INFO (trn1.32xlarge)      "
          echo "============================================="
          /opt/aws/neuron/bin/neuron-ls || neuron-ls || echo "neuron-ls not available on host"
          echo "============================================="

      - name: Run ATen Unit Tests in Container
        env:
          PYTEST_ARGS: "${{ github.event.inputs.test_path }}"
        run: |
          echo "============================================="
          echo "           RUNNING ATEN UNIT TESTS           "
          echo "============================================="
          # Mount Neuron devices into container
          NEURON_DEVICES=""
          for i in $(seq 0 15); do
            if [ -e "/dev/neuron$i" ]; then
              NEURON_DEVICES="$NEURON_DEVICES --device=/dev/neuron$i"
            fi
          done
          echo "Neuron devices: $NEURON_DEVICES"

          docker run --rm \
            $NEURON_DEVICES \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_WORKSPACE=/workspace \
            -e NEURON_LAUNCH_BLOCKING=1 \
            "$DOCKER_IMAGE" \
            bash -c "
              echo 'Python version:' && python3 --version
              echo 'PyTorch version:' && python3 -c 'import torch; print(torch.__version__)'
              echo ''
              echo '--- Neuron Device Info (in container) ---'
              neuron-ls || /opt/aws/neuron/bin/neuron-ls || echo 'neuron-ls not available'
              echo ''
              echo 'Installing test dependencies...'
              pip install pytest pytest-xdist pytest-html pytest-json-report pytest-forked pytest-cov
              echo ''
              echo 'Running ATen unit tests...'
              mkdir -p outputs/test-reports
              TEST_PATH='${PYTEST_ARGS:-}'
              if [ -n \"\$TEST_PATH\" ]; then
                echo \"Running specific tests: \$TEST_PATH\"
                ./tools/run-test-parallel \"\$TEST_PATH\" --skip-distributed --coverage --json-report --report-dir=outputs/test-reports
              else
                echo 'Running all ATen unit tests...'
                ./tools/run-test-parallel --skip-distributed --coverage --json-report --report-dir=outputs/test-reports
              fi
            "
          echo "============================================="

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aten-test-results
          path: |
            outputs/
            *.html
            *.xml
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "============================================="
          echo "              TEST SUMMARY                   "
          echo "============================================="
          if [ -f outputs/test-reports/report.json ]; then
            echo "Test report generated successfully"
            jq '.summary' outputs/test-reports/report.json 2>/dev/null || echo "Could not parse report"
          else
            echo "No test report found"
          fi
          echo "============================================="
