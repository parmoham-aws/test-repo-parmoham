name: Nightly Base Image Build

# This workflow is dispatched by nightly-dispatcher.yml on main.
# Each branch has its own copy with its own build logic and Dockerfile.
# NO schedule here — the dispatcher handles scheduling.
#
# The DDB polling logic runs on the EC2 instance during boot (user data script),
# NOT in this workflow file. The EC2 sets NIGHTLY_IMAGE_URI env var when ready.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: Build Base Image ────────────────────────────────
  # The neuron.build-nightly label triggers:
  #   1. Webhook → Nightly Image Trigger Lambda → CodeBuild (starts the build)
  #   2. Scale-up Lambda → EC2 runner (with DDB polling in user data)
  # By the time the runner picks up this job, the image is already being built
  # and the EC2 user data script is polling DDB for completion.
  build-base:
    name: Build Nightly Base Image
    runs-on: [self-hosted, linux, neuron.build-nightly]
    timeout-minutes: 120
    outputs:
      base_image: ${{ steps.result.outputs.image_uri }}
    steps:
      - name: Get nightly image URI
        id: result
        run: |
          echo "========================================="
          echo "  Nightly Base Image Build"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Run ID: ${{ github.run_id }}"
          echo "========================================="
          echo ""
          echo "NIGHTLY_IMAGE_URI=${NIGHTLY_IMAGE_URI:-not set}"
          if [ -n "$NIGHTLY_IMAGE_URI" ]; then
            echo "image_uri=$NIGHTLY_IMAGE_URI" >> $GITHUB_OUTPUT
            echo "✓ Nightly base image: $NIGHTLY_IMAGE_URI"
          else
            echo "::warning::NIGHTLY_IMAGE_URI not set — EC2 user data may still be polling"
            echo "Check /var/log/runner-setup.log on the EC2 instance for details"
          fi

  # ── Job 2: Report ──────────────────────────────────────────
  report:
    name: Report Results
    needs: [build-base]
    if: always()
    runs-on: [self-hosted, linux]
    steps:
      - name: Summary
        run: |
          echo "========================================="
          echo "  Nightly Build Results"
          echo "========================================="
          echo "  Branch: ${{ github.ref_name }}"
          echo "  build-base: ${{ needs.build-base.result }}"
          echo "  base_image: ${{ needs.build-base.outputs.base_image }}"
          echo "========================================="