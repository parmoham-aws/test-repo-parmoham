name: PR Checks
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
env:
  AWS_DEFAULT_REGION: us-west-2
jobs:
  hello-world:
    name: Hello World Smoke Test
    runs-on: [self-hosted, linux, neuron, neuron.build-image]
    steps:
      - name: Hello from Kaizen 1
        run: echo "Hello from Kaizen EKS container!"
      - name: Check environment
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "PWD: $(pwd)"
          echo "Python: $(python3 --version 2>&1 || echo 'not found')"
          echo "Workspace contents:"
          ls -la /workspace/ || echo "No /workspace"
      - name: Multi-line script test
        run: |
          A=1
          B=2
          C=$((A + B))
          echo "Math works: $A + $B = $C"
          if [ "$C" -eq 3 ]; then
            echo "SUCCESS: if/then/fi works!"
          else
            echo "FAIL"
            exit 1
          fi

